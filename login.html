<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Win11 Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    h1 {
      text-align: center;
      font-size: 1.4rem;
      margin-bottom: 0.4rem;
      color: #f1f5f9;
    }
    p.sub {
      text-align: center;
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 1.8rem;
    }
    label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.3rem; }
    input[type=text], input[type=password] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 0.95rem;
      margin-bottom: 1.1rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 0.7rem;
      background: #3b82f6;
      border: none;
      border-radius: 7px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #2563eb; }
    .error {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      border-radius: 7px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🖥️ Win11 Manager</h1>
    <p class="sub">Windows 11 Docker Web Manager v3.1</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required/>

      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
